# ─────────────────────────────────────────────────────────────────────────────
# Paper Hallway — Netlify Configuration
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "pnpm build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes served by index.html (React Router handles them)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Lemon Squeezy webhook endpoint
[[redirects]]
  from   = "/api/lemon-webhook"
  to     = "/.netlify/functions/lemon-webhook"
  status = 200
